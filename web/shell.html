<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#071827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MoonGoons Take Back">
  <title>$GODOT_PROJECT_NAME</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030916;
      --panel: rgba(7, 21, 34, 0.88);
      --cyan: #7ee7ff;
      --mint: #7ef5d0;
      --rose: #ff7094;
      --text: #eafdff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at 50% 20%, #12395a 0, #071827 46%, #020711 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 12% 24%, rgba(126,231,255,0.25) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 18%, rgba(234,253,255,0.2) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 68%, rgba(126,245,208,0.18) 0 1px, transparent 2px);
      background-size: 260px 220px, 330px 250px, 420px 360px;
      pointer-events: none;
    }
    #shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      gap: 8px;
    }
    header, footer {
      border: 1px solid rgba(126,231,255,0.24);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 8px 12px;
      box-shadow: 0 0 28px rgba(126,231,255,0.08);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(16px, 2.6vw, 24px);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge {
      color: #06101c;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    #game-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(126,231,255,0.30);
      border-radius: 18px;
      background: #020711;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.36), 0 0 36px rgba(126,231,255,0.10);
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
    #status {
      position: absolute;
      inset: auto 14px 14px 14px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    #status-progress {
      min-width: min(520px, 88vw);
      border: 1px solid rgba(126,231,255,0.32);
      border-radius: 14px;
      background: rgba(7, 21, 34, 0.92);
      padding: 10px 12px;
    }
    #status-progress-inner {
      height: 10px;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mint), var(--cyan));
      transition: width 180ms ease;
    }
    #status-notice {
      margin-top: 8px;
      color: #bfefff;
      font-size: 13px;
      text-align: center;
    }
    #status-indeterminate, #status-notice noscript { color: var(--rose); }
    footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #a8cadd;
      font-size: clamp(11px, 1.8vw, 14px);
    }
    footer strong { color: var(--mint); }
    @media (max-width: 760px) {
      #shell { gap: 6px; padding: 6px; }
      header, footer { border-radius: 12px; padding: 6px 8px; }
      footer { display: none; }
      .badge { font-size: 10px; padding: 4px 8px; }
    }
  </style>
$GODOT_HEAD_INCLUDE
</head>
<body>
  <div id="shell">
    <header>
      <h1>MoonGoons Take Back</h1>
      <span class="badge">Browser Test Build</span>
    </header>
    <main id="game-wrap">
      <canvas id="canvas">Your browser does not support HTML5 canvas.</canvas>
      <div id="status">
        <div id="status-progress">
          <div id="status-progress-inner"></div>
          <div id="status-notice">Loading lunar command systems...</div>
        </div>
      </div>
    </main>
    <footer>
      <span><strong>Touch:</strong> tap unit, drag select, use command deck</span>
      <span><strong>Desktop:</strong> left select, right move, C story</span>
    </footer>
  </div>
  <script src="$GODOT_URL"></script>
  <script>
    const statusOverlay = document.getElementById('status');
    const progressInner = document.getElementById('status-progress-inner');
    const statusNotice = document.getElementById('status-notice');
    const engine = new Engine($GODOT_CONFIG);

    function setStatusMode(mode) {
      if (mode === 'hidden') {
        statusOverlay.style.display = 'none';
      } else {
        statusOverlay.style.display = 'flex';
      }
    }

    engine.startGame({
      onProgress: function(current, total) {
        if (total > 0) {
          progressInner.style.width = `${Math.round((current / total) * 100)}%`;
        }
      }
    }).then(function() {
      setStatusMode('hidden');
    }).catch(function(error) {
      statusNotice.textContent = 'Launch failed: ' + error;
      progressInner.style.width = '100%';
    });
  </script>
</body>
</html>
