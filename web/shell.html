<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#071827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MoonGoons Take Back">
  <title>$GODOT_PROJECT_NAME</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030916;
      --panel: rgba(7, 21, 34, 0.92);
      --cyan: #7ee7ff;
      --mint: #7ef5d0;
      --rose: #ff7094;
      --amber: #ffc36c;
      --text: #eafdff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at 50% 20%, #12395a 0, #071827 46%, #020711 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 12% 24%, rgba(126,231,255,0.25) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 18%, rgba(234,253,255,0.2) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 68%, rgba(126,245,208,0.18) 0 1px, transparent 2px);
      background-size: 260px 220px, 330px 250px, 420px 360px;
      pointer-events: none;
    }
    #shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      gap: 8px;
    }
    header, footer {
      border: 1px solid rgba(126,231,255,0.24);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 8px 12px;
      box-shadow: 0 0 28px rgba(126,231,255,0.08);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(16px, 2.6vw, 24px);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge {
      color: #06101c;
      background: linear-gradient(135deg, var(--mint), var(--cyan));
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    #game-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(126,231,255,0.30);
      border-radius: 18px;
      background: #020711;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.36), 0 0 36px rgba(126,231,255,0.10);
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
    #status {
      position: absolute;
      inset: auto 14px 14px 14px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    #status-progress {
      min-width: min(560px, 90vw);
      border: 1px solid rgba(126,231,255,0.32);
      border-radius: 14px;
      background: rgba(7, 21, 34, 0.96);
      padding: 10px 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.38);
    }
    #status-progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(126,231,255,0.10);
    }
    #status-progress-inner {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mint), var(--cyan));
      transition: width 180ms ease;
    }
    #status-notice {
      margin-top: 8px;
      color: #bfefff;
      font-size: 13px;
      text-align: center;
    }
    #status-detail {
      min-height: 18px;
      margin-top: 4px;
      color: #759bad;
      font-size: 11px;
      text-align: center;
    }
    #recovery-actions {
      display: none;
      justify-content: center;
      gap: 8px;
      margin-top: 9px;
      pointer-events: auto;
    }
    #recovery-actions.visible { display: flex; }
    button {
      border: 1px solid rgba(126,231,255,0.55);
      border-radius: 9px;
      background: rgba(20,64,83,0.95);
      color: var(--text);
      padding: 7px 12px;
      font: inherit;
      font-size: 12px;
      font-weight: 750;
      cursor: pointer;
    }
    button:hover { background: rgba(32,88,108,0.98); }
    button.danger {
      border-color: rgba(255,112,148,0.65);
      background: rgba(92,31,52,0.96);
    }
    footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #a8cadd;
      font-size: clamp(11px, 1.8vw, 14px);
    }
    footer strong { color: var(--mint); }
    @media (max-width: 760px) {
      #shell { gap: 6px; padding: 6px; }
      header, footer { border-radius: 12px; padding: 6px 8px; }
      footer { display: none; }
      .badge { font-size: 10px; padding: 4px 8px; }
      #status-progress { min-width: 92vw; }
    }
  </style>
$GODOT_HEAD_INCLUDE
</head>
<body>
  <div id="shell">
    <header>
      <h1>MoonGoons Take Back</h1>
      <span class="badge">Campaign Hub</span>
    </header>
    <main id="game-wrap">
      <canvas id="canvas">Your browser does not support HTML5 canvas.</canvas>
      <div id="status">
        <div id="status-progress">
          <div id="status-progress-track"><div id="status-progress-inner"></div></div>
          <div id="status-notice">Preparing the MoonGoons campaign hub...</div>
          <div id="status-detail">Checking for an older frozen web cache.</div>
          <div id="recovery-actions">
            <button id="retry-button" type="button">Retry launch</button>
            <button id="reset-button" class="danger" type="button">Clear cache and reload</button>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <span><strong>Syndicate Rising:</strong> rebuild the hideout and run criminal scores</span>
      <span><strong>Campaign Hub:</strong> criminal, precinct, and RTS routes</span>
    </footer>
  </div>
  <script src="$GODOT_URL"></script>
  <script>
    const WEB_FIX_VERSION = '2';
    const LEGACY_CACHE_PREFIX = 'MoonGoons Take B-sw-cache-';
    const statusOverlay = document.getElementById('status');
    const progressInner = document.getElementById('status-progress-inner');
    const statusNotice = document.getElementById('status-notice');
    const statusDetail = document.getElementById('status-detail');
    const recoveryActions = document.getElementById('recovery-actions');
    const retryButton = document.getElementById('retry-button');
    const resetButton = document.getElementById('reset-button');
    let launchTimer = null;
    let gameStarted = false;

    function setStatusMode(mode) {
      statusOverlay.style.display = mode === 'hidden' ? 'none' : 'flex';
    }

    function showRecovery(message, detail) {
      statusNotice.textContent = message;
      statusNotice.style.color = 'var(--amber)';
      statusDetail.textContent = detail || 'Use Clear cache and reload to remove an older MoonGoons web build.';
      recoveryActions.classList.add('visible');
    }

    async function clearLegacyWebState(forceReload) {
      let removedRegistration = false;
      let hadController = false;

      try {
        if ('serviceWorker' in navigator) {
          hadController = Boolean(navigator.serviceWorker.controller);
          const registrations = await navigator.serviceWorker.getRegistrations();
          const localRegistrations = registrations.filter((registration) => {
            try {
              return new URL(registration.scope).pathname.includes('/MoonGoons-Take-Back/');
            } catch (_) {
              return false;
            }
          });
          removedRegistration = localRegistrations.length > 0;
          await Promise.all(localRegistrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(
            keys
              .filter((key) => key.startsWith(LEGACY_CACHE_PREFIX))
              .map((key) => caches.delete(key))
          );
        }
      } catch (error) {
        console.warn('MoonGoons legacy cache cleanup warning:', error);
      }

      const alreadyReloaded = sessionStorage.getItem('moongoons-webfix') === WEB_FIX_VERSION;
      if ((forceReload || hadController || removedRegistration) && !alreadyReloaded) {
        sessionStorage.setItem('moongoons-webfix', WEB_FIX_VERSION);
        const url = new URL(window.location.href);
        url.searchParams.set('webfix', WEB_FIX_VERSION);
        url.searchParams.set('t', String(Date.now()));
        window.location.replace(url.toString());
        return false;
      }

      sessionStorage.removeItem('moongoons-webfix');
      return true;
    }

    function formatMegabytes(bytes) {
      return `${(bytes / 1048576).toFixed(1)} MB`;
    }

    async function launchGame() {
      statusNotice.style.color = '#bfefff';
      statusNotice.textContent = 'Loading MoonGoons campaign systems...';
      statusDetail.textContent = 'Downloading the game engine and campaign data.';
      recoveryActions.classList.remove('visible');
      progressInner.style.width = '0%';

      const engine = new Engine($GODOT_CONFIG);
      clearTimeout(launchTimer);
      launchTimer = window.setTimeout(() => {
        if (!gameStarted) {
          showRecovery(
            'The browser launch is taking too long.',
            'The old service worker may still control this tab. Clear the cache below, then the page will reload once.'
          );
        }
      }, 75000);

      try {
        await engine.startGame({
          onProgress: function(current, total) {
            if (total > 0) {
              const percent = Math.max(0, Math.min(100, Math.round((current / total) * 100)));
              progressInner.style.width = `${percent}%`;
              statusDetail.textContent = `${percent}% · ${formatMegabytes(current)} of ${formatMegabytes(total)}`;
            }
          }
        });
        gameStarted = true;
        clearTimeout(launchTimer);
        setStatusMode('hidden');
      } catch (error) {
        clearTimeout(launchTimer);
        console.error('MoonGoons browser launch failed:', error);
        progressInner.style.width = '100%';
        showRecovery('Launch failed.', String(error && error.message ? error.message : error));
      }
    }

    retryButton.addEventListener('click', () => {
      window.location.reload();
    });

    resetButton.addEventListener('click', async () => {
      statusNotice.textContent = 'Clearing the older web build...';
      statusDetail.textContent = 'The page will reload automatically.';
      recoveryActions.classList.remove('visible');
      sessionStorage.removeItem('moongoons-webfix');
      const ready = await clearLegacyWebState(true);
      if (ready) {
        const url = new URL(window.location.href);
        url.searchParams.set('webfix', WEB_FIX_VERSION);
        url.searchParams.set('t', String(Date.now()));
        window.location.replace(url.toString());
      }
    });

    window.addEventListener('error', (event) => {
      if (!gameStarted) {
        showRecovery('A browser startup error stopped the game.', event.message || 'Unknown browser error.');
      }
    });

    window.addEventListener('unhandledrejection', (event) => {
      if (!gameStarted) {
        showRecovery('The game loader was interrupted.', String(event.reason || 'Unknown promise rejection.'));
      }
    });

    clearLegacyWebState(false).then((ready) => {
      if (ready) {
        launchGame();
      }
    }).catch((error) => {
      console.error('MoonGoons cleanup stage failed:', error);
      launchGame();
    });
  </script>
</body>
</html>
