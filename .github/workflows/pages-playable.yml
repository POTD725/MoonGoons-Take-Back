name: Browser Playable Build

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "data/**"
      - "docs/**"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "tools/**"
      - "web/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/pages-playable.yml"
  pull_request:
    branches: [main]
    paths:
      - "assets/**"
      - "data/**"
      - "docs/**"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "tools/**"
      - "web/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/pages-playable.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-web-playable:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3-stable"
      GODOT_TEMPLATE_VERSION: "4.3.stable"
      GODOT_BINARY: "Godot_v4.3-stable_linux.x86_64"
      WEB_PRESET: "Web Playable"
      WEB_OUTPUT: "builds/web/index.html"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync established MoonGoons skins
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x tools/fetch_moongoons_skins.sh
          ./tools/fetch_moongoons_skins.sh
          test "$(find assets/skins/moongoons -maxdepth 1 -type f -name '*.png' | wc -l)" -eq 14

      - name: Install Godot and web export templates
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            --output ".ci/godot/godot.zip"
          unzip -q ".ci/godot/godot.zip" -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"

          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            --output ".ci/godot/export_templates.tpz"
          unzip -q ".ci/godot/export_templates.tpz" -d .ci/godot/export_templates
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp .ci/godot/export_templates/templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Import project and run smoke tests
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x compile_and_test.sh
          GODOT_BIN="${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" ./compile_and_test.sh

      - name: Export browser playable build
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$(dirname "${WEB_OUTPUT}")"
          ".ci/godot/${GODOT_BINARY}" --headless --path . --export-release "${WEB_PRESET}" "${WEB_OUTPUT}"
          touch builds/web/.nojekyll
          test -f builds/web/index.html
          test -f builds/web/index.wasm
          test -f builds/web/index.pck

          # Give the game package an immutable name and explicitly tell Godot's
          # loader to use it. Custom shells do not always emit a mainPack field.
          VERSIONED_PCK="index-${GITHUB_SHA}.pck"
          mv builds/web/index.pck "builds/web/${VERSIONED_PCK}"
          python3 - "builds/web/index.html" "${VERSIONED_PCK}" <<'PY'
          import pathlib
          import sys

          html_path = pathlib.Path(sys.argv[1])
          versioned_pck = sys.argv[2]
          html = html_path.read_text(encoding="utf-8")

          # Keep loading progress accurate after renaming the data package.
          file_size_key = '"index.pck":'
          if file_size_key not in html:
              raise SystemExit("Godot fileSizes entry for index.pck was not found")
          html = html.replace(file_size_key, f'"{versioned_pck}":', 1)

          # Godot 4.3 custom shells may omit mainPack. Inject it beside the
          # executable value so Engine.startGame loads the immutable package.
          if '"mainPack":"index.pck"' in html:
              html = html.replace('"mainPack":"index.pck"', f'"mainPack":"{versioned_pck}"', 1)
          elif '"mainPack":null' in html:
              html = html.replace('"mainPack":null', f'"mainPack":"{versioned_pck}"', 1)
          elif '"executable":"index"' in html:
              html = html.replace(
                  '"executable":"index"',
                  f'"executable":"index","mainPack":"{versioned_pck}"',
                  1,
              )
          else:
              raise SystemExit("Godot executable configuration was not found")

          # The outer browser frame must describe Take Back as the cops-side
          # game, not a multi-campaign launcher or the criminal-side game.
          replacements = {
              'Campaign Hub': 'Peacekeeper Command',
              'Preparing the MoonGoons campaign hub...': 'Preparing the Lunar Peacekeeper precinct...',
              'Loading MoonGoons campaign systems...': 'Loading Peacekeeper command systems...',
              'Downloading the game engine and campaign data.': 'Downloading the precinct, threat map, and patrol systems.',
              '<span><strong>Syndicate Rising:</strong> rebuild the hideout and run criminal scores</span>': '<span><strong>Peacekeeper Precinct:</strong> build divisions, assign officers, and process arrests</span>',
              '<span><strong>Campaign Hub:</strong> criminal, precinct, and RTS routes</span>': '<span><strong>Syndicate Threat Map:</strong> investigate districts, intercept scores, and reclaim the Moon</span>',
              "const WEB_FIX_VERSION = '2';": "const WEB_FIX_VERSION = '3';",
          }
          for old, new in replacements.items():
              html = html.replace(old, new)

          html_path.write_text(html, encoding="utf-8")
          PY

          test -f "builds/web/${VERSIONED_PCK}"
          grep -Fq "\"mainPack\":\"${VERSIONED_PCK}\"" builds/web/index.html
          grep -Fq "\"${VERSIONED_PCK}\":" builds/web/index.html
          if grep -Fq '"index.pck"' builds/web/index.html; then
            echo "ERROR: Export still references the cache-prone index.pck filename." >&2
            exit 1
          fi

          # Keep this one-release cleanup script at the former worker URL.
          cp web/legacy-service-worker-reset.js builds/web/index.service.worker.js
          test -f builds/web/index.service.worker.js
          ls -lh builds/web

      - name: Upload browser validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Take-Back-Web-Playable
          path: builds/web
          retention-days: 14

      - name: Validate browser boot package
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f builds/web/index.html
          test -f builds/web/index.service.worker.js
          VERSIONED_PCK="index-${GITHUB_SHA}.pck"
          test -f "builds/web/${VERSIONED_PCK}"
          grep -Fq "\"mainPack\":\"${VERSIONED_PCK}\"" builds/web/index.html
          grep -Fq "\"${VERSIONED_PCK}\":" builds/web/index.html
          if grep -Fq '"index.pck"' builds/web/index.html; then
            echo "ERROR: Browser package still references stale index.pck." >&2
            exit 1
          fi
          if grep -Fq '"serviceWorker":"index.service.worker.js"' builds/web/index.html; then
            echo "ERROR: Godot export still registers the legacy PWA worker." >&2
            exit 1
          fi
          if grep -Fq 'index.worker.js' builds/web/index.service.worker.js; then
            echo "ERROR: Cleanup worker references the missing threaded worker." >&2
            exit 1
          fi
          grep -Fq 'Clear cache and reload' builds/web/index.html
          grep -Fq 'Peacekeeper Command' builds/web/index.html
          grep -Fq 'Lunar Peacekeeper precinct' builds/web/index.html
          if grep -Fq 'rebuild the hideout and run criminal scores' builds/web/index.html; then
            echo "ERROR: Criminal-campaign language remains in the Take Back shell." >&2
            exit 1
          fi
          grep -F '"serviceWorker"' builds/web/index.html || true

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: export-web-playable
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy playable build to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment receipt
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.deployment-status.json';
            const receipt = {
              status: 'success',
              page_url: process.env.PAGE_URL,
              deployed_commit: context.sha,
              workflow_run: context.runId,
              deployed_at: new Date().toISOString()
            };
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(current.data)) sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              message: 'Record successful web deployment [skip ci]',
              content: Buffer.from(JSON.stringify(receipt, null, 2) + '\n').toString('base64'),
              sha
            });
