name: MoonGoons Godot Verification

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  verify-godot-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot headless test binary
        shell: bash
        run: |
          set -Eeuo pipefail
          GODOT_VERSION="4.3-stable"
          GODOT_ARCHIVE="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          GODOT_BINARY="Godot_v${GODOT_VERSION}_linux.x86_64"
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ARCHIVE}" \
            --output ".ci/godot/${GODOT_ARCHIVE}"
          unzip -q ".ci/godot/${GODOT_ARCHIVE}" -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"
          echo "GODOT_BIN=${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" >> "${GITHUB_ENV}"

      - name: Run project import and smoke tests
        shell: bash
        run: |
          chmod +x compile_and_test.sh
          ./compile_and_test.sh

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moongoons-godot-failure-logs
          path: logs/
          retention-days: 7
