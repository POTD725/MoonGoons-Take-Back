name: Android APK Test Build

on:
  push:
    branches: [main, staging]
    paths:
      - "assets/**"
      - "data/**"
      - "docs/**"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3-stable"
      GODOT_TEMPLATE_VERSION: "4.3.stable"
      GODOT_BINARY: "Godot_v4.3-stable_linux.x86_64"
      ANDROID_PRESET: "Android Test APK"
      APK_OUTPUT: "builds/android/MoonGoonsTakeBack-debug.apk"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages for Godot
        shell: bash
        run: |
          set -Eeuo pipefail
          # sdkmanager closes stdin after accepting the final license. Under
          # pipefail that gives `yes` SIGPIPE/141 even when acceptance worked.
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            --output ".ci/godot/godot.zip"
          unzip -q ".ci/godot/godot.zip" -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"

          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            --output ".ci/godot/export_templates.tpz"
          unzip -q ".ci/godot/export_templates.tpz" -d .ci/godot/export_templates
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp .ci/godot/export_templates/templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Configure Godot Android editor settings
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${HOME}/.config/godot"
          cat > "${HOME}/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF

      - name: Import project and run smoke tests
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x compile_and_test.sh
          GODOT_BIN="${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" ./compile_and_test.sh

      - name: Export Android debug APK
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$(dirname "${APK_OUTPUT}")"
          ".ci/godot/${GODOT_BINARY}" --headless --path . --export-debug "${ANDROID_PRESET}" "${APK_OUTPUT}"
          ls -lh "${APK_OUTPUT}"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Take-Back-Android-Test-APK
          path: builds/android/*.apk
          retention-days: 14
