name: Android APK Test Build

on:
  push:
    branches: [main, staging]
    paths:
      - "assets/**"
      - "data/**"
      - "docs/**"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/android-apk.yml"
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.3-stable"
      GODOT_TEMPLATE_VERSION: "4.3.stable"
      GODOT_BINARY: "Godot_v4.3-stable_linux.x86_64"
      ANDROID_PRESET: "Android Test APK"
      APK_OUTPUT: "builds/android/MoonGoonsTakeBack-debug.apk"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages for Godot
        shell: bash
        run: |
          set -Eeuo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;23.2.8568313"

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .ci/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            --output ".ci/godot/godot.zip"
          unzip -q ".ci/godot/godot.zip" -d .ci/godot
          chmod +x ".ci/godot/${GODOT_BINARY}"

          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            --output ".ci/godot/export_templates.tpz"
          unzip -q ".ci/godot/export_templates.tpz" -d .ci/godot/export_templates
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp .ci/godot/export_templates/templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Create Android debug keystore
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${HOME}/.android"
          keytool -genkeypair \
            -keystore "${HOME}/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android editor settings
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${HOME}/.config/godot"
          cat > "${HOME}/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project and run smoke tests
        shell: bash
        run: |
          set -Eeuo pipefail
          chmod +x compile_and_test.sh
          GODOT_BIN="${GITHUB_WORKSPACE}/.ci/godot/${GODOT_BINARY}" ./compile_and_test.sh

      - name: Export Android debug APK
        id: export_apk
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p "$(dirname "${APK_OUTPUT}")" logs
          ".ci/godot/${GODOT_BINARY}" \
            --headless \
            --verbose \
            --path . \
            --export-debug "${ANDROID_PRESET}" "${APK_OUTPUT}" \
            2>&1 | tee logs/android_export.log
          export_exit=${PIPESTATUS[0]}
          echo "exit_code=${export_exit}" >> "${GITHUB_OUTPUT}"
          tail -n 160 logs/android_export.log > logs/android_export_tail.log
          if [[ -f "${APK_OUTPUT}" ]]; then
            ls -lh "${APK_OUTPUT}" | tee logs/android_apk_status.txt
          else
            echo "APK was not created." | tee logs/android_apk_status.txt
          fi
          exit 0

      - name: Upload Android export diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Android-Export-Diagnostics
          path: |
            logs/android_export.log
            logs/android_export_tail.log
            logs/android_apk_status.txt
          retention-days: 14

      - name: Upload Android APK artifact
        if: steps.export_apk.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: MoonGoons-Take-Back-Android-Test-APK
          path: builds/android/*.apk
          retention-days: 14

      - name: Fail when Android export failed
        if: steps.export_apk.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Godot Android export failed with exit code ${{ steps.export_apk.outputs.exit_code }}."
          cat logs/android_export_tail.log
          exit 1
